name: Monitoring CD

on:
  push:
    branches: [ main ]
    paths:
      - 'monitoring/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'monitoring/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Copy monitoring config and docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "monitoring/docker-compose.yml,monitoring/prometheus.yml"
          target: ~/daily-diary/monitoring
          strip_components: 1

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/daily-diary/monitoring
            docker compose pull
            docker compose up -d
            docker image prune -f